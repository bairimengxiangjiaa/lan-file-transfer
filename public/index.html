<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>局域网文件传输</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>📁 局域网文件传输</h1>
            <div class="device-info">
                <span class="device-name" id="deviceName">设备名称</span>
                <span class="connection-status" id="connectionStatus">● 连接中...</span>
            </div>
        </header>

        <!-- 连接信息卡片 -->
        <div class="connect-card" id="connectCard">
            <div class="connect-info">
                <div class="connect-url">
                    <span class="label">手机访问地址：</span>
                    <span class="url" id="connectUrl">-</span>
                    <button class="btn-copy" id="copyBtn" title="复制">📋</button>
                </div>
                <div class="connect-hint">手机和电脑连接同一WiFi，扫描二维码或输入地址即可传输</div>
            </div>
            <div class="qrcode" id="qrcode"></div>
        </div>

        <!-- 主要内容区 -->
        <main class="main-content">
            <!-- 左侧：设备列表 -->
            <aside class="sidebar">
                <div class="section-title">
                    <h2>在线设备</h2>
                    <span class="device-count" id="deviceCount">0</span>
                </div>
                <div class="device-list" id="deviceList">
                    <div class="empty-state">
                        <p>暂无其他设备</p>
                        <p class="hint">等待其他设备加入...</p>
                    </div>
                </div>
            </aside>

            <!-- 右侧：文件区域 -->
            <section class="content">
                <!-- 上传区域 -->
                <div class="upload-section">
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-icon">📤</div>
                        <p class="drop-text">拖拽文件到这里上传</p>
                        <p class="drop-hint">或点击选择</p>
                        <input type="file" id="fileInput" multiple hidden>
                        <input type="file" id="folderInput" webkitdirectory directory hidden>
                        <div class="upload-buttons">
                            <button class="btn-upload" id="selectFileBtn">📄 选择文件</button>
                            <button class="btn-upload" id="selectFolderBtn">📁 选择文件夹</button>
                        </div>
                    </div>
                </div>

                <!-- 传输状态 -->
                <div class="transfer-section" id="transferSection" style="display: none;">
                    <div class="section-title">
                        <h2>传输状态</h2>
                    </div>
                    <div class="transfer-list" id="transferList"></div>
                </div>

                <!-- 文件列表 -->
                <div class="file-section">
                    <div class="section-title">
                        <h2>已上传文件</h2>
                        <div>
                            <button class="btn-clear-all" id="clearAllBtn" title="清空所有文件">🗑️ 清空</button>
                            <button class="btn-refresh" id="refreshBtn" title="刷新">🔄</button>
                        </div>
                    </div>
                    <div class="file-list" id="fileList">
                        <div class="empty-state">
                            <p>暂无文件</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 设备名称设置弹窗 -->
    <div class="modal" id="nameModal">
        <div class="modal-content">
            <h2>设置设备名称</h2>
            <input type="text" id="nameInput" placeholder="输入设备名称" maxlength="20">
            <button class="btn-primary" id="setNameBtn">确定</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
